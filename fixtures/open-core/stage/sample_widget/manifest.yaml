id: com.wavecrux.test.sample_gauge
version: 1.0.0
display_name: Sample Gauge
category: instrument
runtime: rive
runtime_asset_path: animations/gauge.riv
required_api_version: 1
signal_bindings:
  - name: value
    description: Numeric input driving the gauge needle position.
    signal_type: vector
    bit_width:
      min: 1
      max: 32
    value_range:
      min: 0.0
      max: 255.0
    required: true
    default_policy: hold_last
  - name: alarm
    description: Boolean input that switches the gauge into alarm state.
    signal_type: scalar
    required: false
    default_policy: treat_as_zero
parameters:
  - binding: value
    normalizer:
      kind: linear
      input_min: 0.0
      input_max: 255.0
      output_min: 0.0
      output_max: 1.0
      clamp: true
